<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>
    <h1>Books</h1>
    <form method="post">
        {% csrf_token %}
        <label for="search">Search Books:</label>
        <input type="text" name="q" id="search">
        <input type="submit" value="Search">
    </form>
    <ul>
        {% for book in books %}
        <li>{{ book.title }} by {{ book.author }}</li>
        {% endfor %}
    </ul>
</body>
</html>
